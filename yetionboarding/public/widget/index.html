<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yeti Guide Widget</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: transparent;
        color: #1d1d1f;
        min-height: 100vh;
        overflow: hidden;
      }
      body.yeti-demo-large {
        min-height: 680px;
      }

      /* ——————————————————————————————————
       YETI WIDGET — everything below here
    —————————————————————————————————— */

      /* Container — fixed bottom right */
      #yeti-widget {
        position: fixed;
        bottom: 18px;
        right: 18px;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        pointer-events: none; /* let clicks pass through empty space */
      }
      #yeti-widget > * {
        pointer-events: auto; /* re-enable on actual children */
      }
      .yeti-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 200px;
      }
      body.yeti-demo-large #yeti-widget {
        bottom: 110px;
        left: 52%;
        right: auto;
        transform: translateX(-50%);
        align-items: center;
      }
      body.yeti-demo-large .yeti-inner {
        width: min(500px, calc(100vw - 32px));
      }
      .yeti-support-copy {
        display: none;
        margin-bottom: 8px;
        text-align: center;
        animation: yetiEntrance 0.55s 0.1s both;
      }
      body.yeti-real-widget .yeti-support-copy {
        display: block;
      }
      .yeti-support-title {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        padding: 6px 12px;
        color: #7b6fe6;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
      }
      .yeti-support-subtitle {
        margin-top: 6px;
        color: #ffffff;
        font-size: 12px;
        font-weight: 800;
        line-height: 1.25;
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
      }

      /* ——— Character image area ——— */
      .yeti-character {
        position: relative;
        width: 110px;
        height: 110px;
        cursor: pointer;
        animation: yetiEntrance 0.6s 0.2s both;
      }
      body.yeti-demo-large .yeti-character {
        width: 250px;
        height: 250px;
      }
      .yeti-character img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      /* Default mascot */
      .yeti-character .yeti-img-idle {
        display: block;
      }
      .yeti-character .yeti-img-thinking {
        display: none;
      }

      /* ——— Wait label under character during thinking ——— */
      .yeti-wait-label {
        display: none;
        font-family: "Segoe UI", Roboto, sans-serif;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #7b6fe6;
        text-align: center;
        margin-top: -4px;
        animation: waitPulse 1.2s infinite;
      }

      /* ——— Mic button ——— */
      .yeti-mic-btn {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2.5px solid #1d1d1f;
        background: #7b6fe6;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin-top: 4px;
        transition:
          transform 0.15s,
          background 0.2s;
        box-shadow: 0 3px 10px rgba(123, 111, 230, 0.3);
      }
      body.yeti-demo-large .yeti-mic-btn {
        width: 86px;
        height: 86px;
        margin-top: 20px;
        border-width: 4px;
      }
      body.yeti-demo-large .yeti-mic-btn svg {
        width: 38px;
        height: 38px;
      }
      .yeti-mic-hint {
        display: none;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: #e74c3c;
        text-align: center;
      }
      body.yeti-demo-large .yeti-mic-hint {
        margin-top: 12px;
        font-size: 15px;
      }
      .yeti-state-listening .yeti-mic-hint {
        display: block;
      }
      .yeti-mic-btn:hover {
        transform: scale(1.1);
        background: #6858d4;
      }
      .yeti-mic-btn:active {
        transform: scale(0.95);
      }
      .yeti-mic-btn svg {
        width: 20px;
        height: 20px;
        fill: #ffffff;
      }
      /* Disabled / loading state */
      .yeti-mic-btn.disabled {
        background: #c5c5c7;
        cursor: not-allowed;
        box-shadow: none;
        position: relative;
      }
      .yeti-mic-btn.disabled:hover {
        transform: none;
      }
      .yeti-mic-btn.disabled svg {
        opacity: 0.3;
      }
      .yeti-mic-btn .mic-spinner {
        display: none;
        position: absolute;
        width: 20px;
        height: 20px;
        border: 2.5px solid rgba(255, 255, 255, 0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spinLoader 0.7s linear infinite;
      }
      .yeti-mic-btn.disabled .mic-spinner {
        display: block;
      }
      @keyframes spinLoader {
        to {
          transform: rotate(360deg);
        }
      }

      /* ——————————————————————————————
       ANIMATION STATES
    —————————————————————————————— */

      /* IDLE — gentle float */
      .yeti-state-idle .yeti-character {
        animation: yetiFloat 3s ease-in-out infinite;
      }

      /* LISTENING — same float as idle, no extra movement */
      .yeti-state-listening .yeti-character {
        animation: yetiFloat 3s ease-in-out infinite;
      }
      .yeti-state-listening .yeti-mic-btn {
        background: #e74c3c;
        box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5);
        animation: micPulse 1.4s infinite;
      }

      /* THINKING — swap to hands-up image, wobble, show "wait" */
      .yeti-state-thinking .yeti-character {
        width: 190px;
        height: 165px;
        animation: yetiWobble 1.5s ease-in-out infinite;
      }
      .yeti-state-thinking .yeti-character .yeti-img-idle {
        display: none;
      }
      .yeti-state-thinking .yeti-character .yeti-img-thinking {
        display: block;
      }
      .yeti-state-thinking .yeti-wait-label {
        display: block;
      }

      .yeti-state-talking .yeti-character {
        animation: yetiBounce 0.45s ease-in-out infinite;
      }

      /* ——————————————————————————————
       KEYFRAMES
    —————————————————————————————— */
      @keyframes yetiEntrance {
        0% {
          opacity: 0;
          transform: translateY(40px) scale(0.7);
        }
        60% {
          opacity: 1;
          transform: translateY(-6px) scale(1.03);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes yetiFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @keyframes yetiListen {
        0% {
          transform: scale(1) rotate(0deg);
        }
        100% {
          transform: scale(1.08) rotate(-2deg);
        }
      }
      @keyframes micPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.5);
        }
        70% {
          box-shadow: 0 0 0 12px rgba(231, 76, 60, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
        }
      }
      @keyframes yetiWobble {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
      @keyframes yetiBounce {
        0%,
        100% {
          transform: translateY(0) scaleY(1);
        }
        50% {
          transform: translateY(-10px) scaleY(1.04);
        }
      }
      @keyframes waitPulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
    </style>
  </head>
  <body>
    <!-- ====== YETI WIDGET ====== -->
    <div id="yeti-widget" class="yeti-state-idle">
      <!-- Inner column — keeps character and mic lined up center -->
      <div class="yeti-inner">
        <div class="yeti-support-copy" aria-hidden="true">
          <div class="yeti-support-title">Customer support</div>
          <div class="yeti-support-subtitle">Click the mic button to ask anything.</div>
        </div>

        <!-- Character -->
        <div class="yeti-character">
          <img class="yeti-img-idle" src="/mainmascot.png" alt="Yeti Guide" />
          <img class="yeti-img-thinking" src="/mascotwithhandsup.png" alt="Yeti Thinking" />
        </div>

        <!-- Wait label (shown only during thinking state) -->
        <div class="yeti-wait-label">wait...</div>

        <!-- Mic button -->
        <button class="yeti-mic-btn" aria-label="Talk to Yeti">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"
            />
            <path
              d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
            />
          </svg>
        </button>
        <div class="yeti-mic-hint">Click to stop</div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const isDemo = params.get("demo") === "1";
      const isDemoPreview = params.get("preview") === "1";
      const isDemoLarge = params.get("large") === "1";
      const demoStorageKey = "yeti-guide-landing-demo-used";
      if (isDemoPreview) {
        document.body.classList.add("yeti-demo-preview");
      }
      if (isDemoLarge) {
        document.body.classList.add("yeti-demo-large");
      }
      if (!isDemo) {
        document.body.classList.add("yeti-real-widget");
      }

      // ——— DOM refs ———
      const widget = document.getElementById("yeti-widget");
      const micBtn = widget.querySelector(".yeti-mic-btn");
      const states = ["idle", "listening", "thinking", "talking"];

      // ——— App state ———
      let isSpeaking = false;
      let isListening = false;
      let recognition = null;
      let bestVoice = null;

      // ——— Private API config. Secrets stay in server environment variables. ———
      const API_BASE_URL = window.location.origin;

      const DEMO_PROMPT = `You are Yeti Guide's landing page demo.
Answer ONLY questions about Yeti Guide itself: what it does, why voice is better, setup, website scanning, embed script, and the mission to replace annoying chatbots.
If asked anything unrelated, politely say you can only explain Yeti Guide.
Keep it one short, friendly, fun sentence.`;

      let SYSTEM_PROMPT = DEMO_PROMPT;
      let chatHistory = [];
      let configReady = false;
      let businessName = "";

      // ——— Load custom personality from Supabase if ?id= is in URL ———
      async function loadYetiConfig() {
        if (isDemo) {
          SYSTEM_PROMPT = DEMO_PROMPT;
          businessName = "Yeti Guide";
          configReady = true;
          setBubbleText(
            !isDemoPreview && localStorage.getItem(demoStorageKey) === "true"
              ? "Demo already used here. Create your Yeti to try the real guide!"
              : "Ask me one question about Yeti Guide.",
          );
          return;
        }

        const yetiId = params.get("id");
        if (!yetiId) {
          configReady = true;
          return;
        }

        try {
          const res = await fetch(
            `${API_BASE_URL}/api/yeti-config?id=${encodeURIComponent(yetiId)}`,
          );
          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            setBubbleText(
              "Yeti could not load your setup yet. Check Vercel env vars for Supabase.",
            );
            return;
          }

          if (data) {
            businessName = data.business_name || "";
            setBubbleText(
              businessName
                ? `Hey! I'm the guide for ${businessName}. Ask me anything about this site!`
                : "Need help finding something? I can guide you.",
            );
          } else {
            setBubbleText("Yeti could not load your setup yet.");
          }
        } catch {
          setBubbleText("Yeti could not load your setup yet.");
        } finally {
          configReady = true;
        }
      }

      // ——— Pick the best human-sounding voice ———
      const voicePrefs = [
        "Google US English",
        "Google UK English Female",
        "Samantha",
        "Karen",
        "Moira",
        "Tessa",
        "Microsoft Zira",
        "Microsoft Jenny",
        "Alex",
      ];

      function pickVoice() {
        const voices = speechSynthesis.getVoices();
        for (const pref of voicePrefs) {
          const match = voices.find((v) => v.name.includes(pref));
          if (match) {
            bestVoice = match;
            break;
          }
        }
        if (!bestVoice && voices.length > 0) {
          bestVoice = voices.find((v) => v.lang.startsWith("en")) || voices[0];
        }
      }

      speechSynthesis.onvoiceschanged = pickVoice;
      pickVoice();

      // ——— State management ———
      function setYetiState(state) {
        states.forEach((s) => widget.classList.remove("yeti-state-" + s));
        widget.classList.add("yeti-state-" + state);
        resizeFrameForState(state);
      }

      function resizeFrameForState() {
        if (window.parent === window) return;
        const height = widget.classList.contains("yeti-state-listening") ? 390 : 360;
        window.parent.postMessage({ type: "yeti-resize", width: 300, height }, "*");
      }

      resizeFrameForState("idle");

      function setBubbleText(_text) {}

      function cleanSpeechText(text) {
        return text
          .replace(/\[[^\]]+\]/g, "")
          .replace(/https?:\/\/(www\.)?/gi, "")
          .replace(/\bwww\./gi, "")
          .replace(/\b([a-z0-9-]+\.[a-z]{2,})(?:\/[^\s.,!?)]*)?/gi, "$1")
          .replace(/\s+/g, " ")
          .trim();
      }

      // ——— Speak text using Web Speech Synthesis ———
      function yetiSpeak(text) {
        if (isSpeaking) return;
        // Cancel anything queued
        speechSynthesis.cancel();
        isSpeaking = true;

        const cleanText = cleanSpeechText(text);

        setBubbleText(cleanText);
        setYetiState("talking");

        const utterance = new SpeechSynthesisUtterance(cleanText);
        if (bestVoice) utterance.voice = bestVoice;
        utterance.rate = 1.05;
        utterance.pitch = 1.1;
        utterance.volume = 1;

        utterance.onend = () => {
          isSpeaking = false;
          setYetiState("idle");
          setBubbleText(
            isDemo && !isDemoPreview
              ? "Demo used here. Create your Yeti to try the real guide!"
              : "Need help finding something? I can guide you.",
          );
        };

        utterance.onerror = () => {
          isSpeaking = false;
          setYetiState("idle");
        };

        speechSynthesis.speak(utterance);
      }
      window.yetiSpeak = yetiSpeak;

      // ——— Ask the private Yeti API. Secrets stay on the server. ———
      async function askYetiApi(messages, question) {
        if (isDemo) {
          const response = await fetch(`${API_BASE_URL}/api/yeti-demo`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });
          if (!response.ok) throw new Error(`${response.status}`);
          const data = await response.json();
          return data.reply?.trim();
        }

        const response = await fetch(`${API_BASE_URL}/api/yeti-chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages,
            yeti_id: params.get("id"),
            question,
          }),
        });
        if (!response.ok) throw new Error(`${response.status}`);
        const data = await response.json();
        return data.reply?.trim();
      }

      async function askYetiBrain(userText) {
        if (isDemo) {
          if (!isDemoPreview) {
            localStorage.setItem(demoStorageKey, "true");
          }
        }

        chatHistory.push({ role: "user", content: userText });
        if (chatHistory.length > 3) chatHistory = chatHistory.slice(-3);

        const messages = isDemo
          ? [{ role: "system", content: SYSTEM_PROMPT }, ...chatHistory]
          : chatHistory;

        try {
          const reply = await askYetiApi(messages, userText);
          if (reply) {
            chatHistory.push({ role: "assistant", content: reply });
            yetiSpeak(reply);
            return;
          }
        } catch {}

        yetiSpeak("Oops, my brain froze! Try again in a sec!");
      }

      // ——— Chrome Web Speech Recognition ———
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      let lastTranscript = "";

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = "en-US";

        recognition.onresult = (event) => {
          let interim = "";
          let final = "";
          for (let i = 0; i < event.results.length; i++) {
            if (event.results[i].isFinal) {
              final += event.results[i][0].transcript;
            } else {
              interim += event.results[i][0].transcript;
            }
          }
          lastTranscript = final || interim;
        };

        recognition.onend = () => {
          // If user hasn't stopped manually and no text yet, keep listening
          if (isListening && !lastTranscript.trim()) {
            try {
              recognition.start();
            } catch (e) {}
            return;
          }

          isListening = false;

          if (lastTranscript.trim()) {
            const finalText = lastTranscript.trim();
            setYetiState("thinking");
            setBubbleText("Hmm let me think... 🤔");

            // Send to Gemma brain
            askYetiBrain(finalText);
          } else {
            setYetiState("idle");
            setBubbleText("Yo, need help finding something? I got you! 🤙");
          }
          lastTranscript = "";
        };

        recognition.onerror = (event) => {
          if (event.error === "no-speech") return;
          isListening = false;
          setYetiState("idle");
          setBubbleText("Yo, need help finding something? I got you! 🤙");
        };
      }

      function startListening() {
        if (isDemo && !isDemoPreview && localStorage.getItem(demoStorageKey) === "true") {
          setBubbleText("Demo already used here. Create your Yeti to try the real guide!");
          return;
        }
        if (!configReady) {
          setBubbleText("Loading your Yeti setup...");
          return;
        }
        if (!recognition || isListening || isSpeaking) return;
        isListening = true;
        lastTranscript = "";
        setYetiState("listening");
        try {
          recognition.start();
        } catch {
          isListening = false;
          setYetiState("idle");
        }
      }

      function stopListening() {
        if (!recognition || !isListening) return;
        recognition.stop();
      }

      // ——— Click yeti character to speak greeting ———
      const yetiChar = widget.querySelector(".yeti-character");
      yetiChar.addEventListener("click", () => {
        if (isSpeaking) return;
        yetiSpeak("Yo, need help finding something? I got you!");
      });

      // ——— Mic button — tap to start/stop listening ———
      micBtn.addEventListener("click", () => {
        if (isSpeaking) return;
        if (isListening) {
          stopListening();
        } else {
          startListening();
        }
      });

      // Load personality before user talks
      loadYetiConfig();
    </script>
  </body>
</html>
